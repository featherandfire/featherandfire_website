<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — Feather & Fire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #1a1714; margin: 0; }
        .font-display { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body>
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background: #1a1714;">

    <div style="position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle, rgba(192,98,42,0.05) 0%, transparent 70%); pointer-events: none;"></div>
    <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none;"></div>

    <div style="text-align: center; position: relative; z-index: 10; padding: 0 1.5rem;">
        <p class="font-display" style="font-size: clamp(5rem, 15vw, 10rem); color: #2e2a24; line-height: 1; font-weight: 300; font-style: italic;">500</p>
        <div style="width: 40px; height: 1px; background: #C0622A; margin: 0 auto 2rem;"></div>
        <h1 class="font-display" style="font-weight: 300; font-size: 1.5rem; color: #e8dfd0; margin-bottom: 0.75rem;">Something went wrong</h1>
        <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #8a8278; font-family: 'Josefin Sans', sans-serif; margin-bottom: 2.5rem;">
            We're looking into it — please try again shortly
        </p>
        <a href="/" style="display: inline-block; padding: 0.75rem 2rem; background: #C0622A; color: #1a1714; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; font-family: 'Josefin Sans', sans-serif; text-decoration: none;">
            Back Home
        </a>
    </div>

</section>
</body>
</html>
