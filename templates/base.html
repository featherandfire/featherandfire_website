<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Feather & Fire{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background: #1e1e1e;
            color: white;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
        }

        footer {
            background: #1e1e1e;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h2>Feather & Fire</h2>
    <nav>
        <a href="/">Home</a>
        <a href="#">Shop</a>
        <a href="#">Art</a>
        <a href="#">Books</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

<footer>
    <p>© 2026 Feather & Fire</p>
</footer>

</body>
</html>
