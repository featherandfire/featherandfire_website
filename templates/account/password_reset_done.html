{% extends "base.html" %}
{% block title %}Check Your Email — Feather & Fire{% endblock %}
{% block content %}

<section class="min-h-screen flex items-center justify-center py-24 relative" style="background: #1a1714;">
    <div style="position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle, rgba(192,98,42,0.05) 0%, transparent 70%); pointer-events: none;"></div>
    <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none;"></div>

    <div class="w-full max-w-md mx-auto px-6 relative z-10 text-center">
        <div class="mb-10">
            <a href="/" class="font-display font-light italic text-3xl" style="color: #e8dfd0;">Feather & Fire</a>
            <div style="width: 40px; height: 1px; background: #C0622A; margin: 1rem auto 0;"></div>
        </div>

        <div style="background: #141210; border: 0.5px solid rgba(255,255,255,0.07); border-radius: 4px; padding: 2.5rem;">
            <h1 class="font-display font-light text-2xl mb-1" style="color: #e8dfd0;">Check your email</h1>
            <div style="width: 40px; height: 1px; background: #C0622A; margin: 1rem auto;"></div>
            <p class="text-xs uppercase tracking-widest" style="color: #8a8278; font-family: 'Josefin Sans', sans-serif; line-height: 2;">
                We've sent a password reset link to your email address. It may take a few minutes to arrive.
            </p>
        </div>

        <p class="text-center mt-6 text-xs uppercase tracking-widest" style="color: #8a8278; font-family: 'Josefin Sans', sans-serif;">
            <a href="{% url 'account_login' %}" style="color: #C0622A; transition: color 0.3s;"
               onmouseover="this.style.color='#D97B44'" onmouseout="this.style.color='#C0622A'">
                Back to login
            </a>
        </p>
    </div>
</section>

{% endblock %}
