{% extends "base.html" %}
{% block title %}Reset Password — Feather & Fire{% endblock %}
{% block content %}

<section class="min-h-screen flex items-center justify-center py-24 relative" style="background: #1a1714;">
    <div style="position: absolute; top: 30%; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(circle, rgba(192,98,42,0.05) 0%, transparent 70%); pointer-events: none;"></div>
    <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none;"></div>

    <div class="w-full max-w-md mx-auto px-6 relative z-10">
        <div class="text-center mb-10">
            <a href="/" class="font-display font-light italic text-3xl" style="color: #e8dfd0;">Feather & Fire</a>
            <div style="width: 40px; height: 1px; background: #C0622A; margin: 1rem auto 0;"></div>
        </div>

        <div style="background: #141210; border: 0.5px solid rgba(255,255,255,0.07); border-radius: 4px; padding: 2.5rem;">
            <h1 class="font-display font-light text-2xl mb-1" style="color: #e8dfd0;">Reset your password</h1>
            <p class="text-xs uppercase tracking-widest mb-8" style="color: #8a8278; font-family: 'Josefin Sans', sans-serif;">We'll send you a link to reset it</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block text-xs uppercase tracking-widest mb-2" style="color: #8a8278; font-family: 'Josefin Sans', sans-serif;">Email</label>
                    <input type="email" name="email" required autofocus
                           placeholder="your@email.com"
                           style="width: 100%; background: #1a1714; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 2px; padding: 0.75rem 1rem; color: #e8dfd0; font-family: 'Josefin Sans', sans-serif; font-size: 0.85rem; outline: none; transition: border-color 0.3s; box-sizing: border-box;"
                           onfocus="this.style.borderColor='#C0622A'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
                </div>
                <button type="submit" class="w-full py-3 text-xs uppercase tracking-widest transition-all duration-300"
                        style="background: #C0622A; color: #1a1714; font-family: 'Josefin Sans', sans-serif; letter-spacing: 0.15em; border: none; cursor: pointer;"
                        onmouseover="this.style.background='#D97B44'" onmouseout="this.style.background='#C0622A'">
                    Send Reset Link
                </button>
            </form>
        </div>

        <p class="text-center mt-6 text-xs uppercase tracking-widest" style="color: #8a8278; font-family: 'Josefin Sans', sans-serif;">
            <a href="{% url 'account_login' %}" style="color: #C0622A; transition: color 0.3s;"
               onmouseover="this.style.color='#D97B44'" onmouseout="this.style.color='#C0622A'">
                Back to login
            </a>
        </p>
    </div>
</section>

{% endblock %}
