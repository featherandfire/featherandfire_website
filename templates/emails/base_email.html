<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block subject %}Feather & Fire{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#1a1714;font-family:Georgia,serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#1a1714;">
  <tr>
    <td align="center" style="padding:40px 20px;">
      <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

        <!-- Header -->
        <tr>
          <td align="center" style="padding-bottom:32px;">
            <p style="margin:0;font-family:Georgia,serif;font-style:italic;font-weight:300;font-size:28px;color:#e8dfd0;letter-spacing:0.05em;">Feather &amp; Fire</p>
            <div style="width:40px;height:1px;background:#C0622A;margin:12px auto 0;"></div>
          </td>
        </tr>

        <!-- Card -->
        <tr>
          <td style="background:#141210;border:1px solid rgba(255,255,255,0.07);border-radius:4px;padding:40px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td align="center" style="padding-top:28px;">
            <p style="margin:0;font-family:Arial,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:#3a3530;">
              &copy; Feather &amp; Fire &nbsp;&middot;&nbsp; feather-and-fire.com
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
