app = "feather-and-fire"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/db.sqlite3"
  MEDIA_ROOT = "/data/media"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
